name: Solana IDL Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  idl-check:
    name: Build and Diff Anchor IDL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Anchor Version Manager
        run: cargo install --git https://github.com/coral-xyz/anchor avm --locked --force

      - name: Install and select Anchor CLI version
        run: |
          avm install 1.0.2
          avm use 1.0.2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          # Explicitly export the path for this temporary shell instance to pass the version check
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Materialize program keypair for verifiable build
        working-directory: solana
        env:
          SOLANA_PROGRAM_KEYPAIR_JSON: ${{ secrets.SOLANA_PROGRAM_KEYPAIR_JSON }}
        run: |
          if [ -z "$SOLANA_PROGRAM_KEYPAIR_JSON" ]; then
            echo "Missing required secret: SOLANA_PROGRAM_KEYPAIR_JSON"
            exit 1
          fi

          mkdir -p target/deploy
          printf '%s' "$SOLANA_PROGRAM_KEYPAIR_JSON" > target/deploy/habitat_settlement_program-keypair.json
          chmod 600 target/deploy/habitat_settlement_program-keypair.json

      - name: Validate program keypair matches declared program ID
        working-directory: solana
        run: |
          declared_program_id=$(sed -n 's/^declare_id!("\([^"]*\)");$/\1/p' src/lib.rs | head -n 1)
          keypair_program_id=$(solana-keygen pubkey target/deploy/habitat_settlement_program-keypair.json)

          if [ -z "$declared_program_id" ]; then
            echo "Unable to read program ID from src/lib.rs"
            exit 1
          fi

          if [ "$declared_program_id" != "$keypair_program_id" ]; then
            echo "Program ID mismatch before build:"
            echo "  Source code has:  $declared_program_id"
            echo "  Keypair file has: $keypair_program_id"
            exit 1
          fi

      - name: Build Anchor program in Docker
        working-directory: solana
        env:
          ANCHOR_USE_DOCKER: "true"
        run: anchor build --verifiable

      - name: Compare generated IDL against committed copy
        run: |
          GENERATED_IDL=solana/target/idl/habitat_settlement_program.json
          COMMITTED_IDL=backend/control/solana/idl/habitat_settlement_program.json

          test -f "$GENERATED_IDL"
          test -f "$COMMITTED_IDL"

          diff -u "$COMMITTED_IDL" "$GENERATED_IDL"
